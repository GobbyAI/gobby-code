name: Release gcode

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Clippy
        run: cargo clippy -p gobby-code --no-default-features -- -D warnings

      - name: Run tests
        run: cargo test -p gobby-code --no-default-features

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — embeddings enabled (Metal GPU)
          - target: aarch64-apple-darwin
            os: macos-latest
            features: "--features embeddings"
            install_cmake: true
            cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            features: "--features embeddings"
            install_cmake: true
            cross: false
          # Linux — no embeddings
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            features: "--no-default-features"
            install_cmake: false
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            features: "--no-default-features"
            install_cmake: false
            cross: true
          # Windows — no embeddings
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            features: "--no-default-features"
            install_cmake: false
            cross: false
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            features: "--no-default-features"
            install_cmake: false
            cross: true

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cmake (macOS)
        if: matrix.install_cmake
        run: brew install cmake

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.cross && startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build gcode
        run: cargo build --release --target ${{ matrix.target }} -p gobby-code ${{ matrix.features }}

      - name: Package (Unix)
        if: "!startsWith(matrix.os, 'windows')"
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../gcode-${{ matrix.target }}.tar.gz gcode
          cd ../../..

      - name: Package (Windows)
        if: startsWith(matrix.os, 'windows')
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path gcode.exe -DestinationPath ../../../gcode-${{ matrix.target }}.zip
          cd ../../..

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gcode-${{ matrix.target }}
          path: |
            gcode-${{ matrix.target }}.tar.gz
            gcode-${{ matrix.target }}.zip

  publish:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish gobby-code to crates.io
        run: cargo publish -p gobby-code --no-default-features
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gcode-*.tar.gz
            gcode-*.zip
          generate_release_notes: true
